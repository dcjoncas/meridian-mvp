<!doctype html>
<html lang="en"><head><meta charset="utf-8" /><meta name="viewport" content="width=device-width, initial-scale=1" /><title>Meridian — Set New Password</title><link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin><link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600&family=Montserrat:wght@300;400;500;600;700&display=swap" rel="stylesheet"><style>:root{--bg:#07080b;--panel:#12131a;--rim:rgba(255,255,255,.08);--text:#eef1fb;--muted:#a6adc9;--gold:#e2c777;--danger:#ffb4b4}*{box-sizing:border-box}body{margin:0;min-height:100vh;display:grid;place-items:center;padding:24px;background:radial-gradient(circle at top left, rgba(226,199,119,.12), transparent 28%), radial-gradient(circle at bottom right, rgba(93,116,255,.08), transparent 25%), var(--bg);font-family:Montserrat,sans-serif;color:var(--text)}.card{width:min(520px,100%);background:linear-gradient(180deg, rgba(255,255,255,.04), rgba(255,255,255,.02));border:1px solid var(--rim);border-radius:22px;padding:28px;box-shadow:0 24px 70px rgba(0,0,0,.38)}.eyebrow{font-size:10px;letter-spacing:.32em;text-transform:uppercase;color:var(--gold)}h1{margin:8px 0 10px;font:600 42px/1.02 "Cormorant Garamond",serif;color:var(--gold)}p{margin:0 0 18px;color:var(--muted);line-height:1.7}label{display:block;font-size:11px;letter-spacing:.18em;text-transform:uppercase;color:var(--muted);margin-bottom:8px}input{width:100%;padding:14px 15px;border-radius:14px;border:1px solid var(--rim);background:rgba(255,255,255,.03);color:var(--text);font:inherit;outline:none;margin-bottom:14px}input:focus{border-color:rgba(226,199,119,.55);box-shadow:0 0 0 4px rgba(226,199,119,.08)}button,a.link{display:inline-flex;align-items:center;justify-content:center;padding:12px 15px;border-radius:12px;border:1px solid var(--rim);background:rgba(255,255,255,.03);color:var(--text);text-decoration:none;font-size:11px;font-weight:700;letter-spacing:.18em;text-transform:uppercase;cursor:pointer}button:hover,a.link:hover{border-color:rgba(226,199,119,.45);color:var(--gold)}.row{display:flex;gap:10px;flex-wrap:wrap;margin-top:6px}.notice{display:none;margin-top:14px;padding:12px 14px;border-radius:14px;border:1px solid var(--rim);background:rgba(255,255,255,.03)}.notice.show{display:block}.notice.error{border-color:rgba(255,180,180,.35);color:var(--danger);background:rgba(255,180,180,.08)}</style></head><body><div class="card"><div class="eyebrow">Meridian member access</div><h1>Set a new password</h1><p>Your reset link is valid once and expires after 30 minutes.</p><label for="new_password">New password</label><input id="new_password" type="password" autocomplete="new-password" /><label for="confirm_password">Confirm password</label><input id="confirm_password" type="password" autocomplete="new-password" /><div class="row"><button id="submitBtn">Update password</button><a class="link" href="/">Back to login</a></div><div class="notice" id="notice"></div></div><script>const $=id=>document.getElementById(id);function show(msg,err=false){const el=$('notice');el.textContent=msg;el.className='notice show'+(err?' error':'');}const token=new URLSearchParams(location.search).get('token')||'';$('submitBtn').onclick=async()=>{const a=$('new_password').value;const b=$('confirm_password').value;if(a.length<8) return show('Password must be at least 8 characters.',true);if(a!==b) return show('Passwords do not match.',true);try{const res=await fetch('/api/auth/reset-password',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({token,new_password:a})});const data=await res.json();if(!res.ok) throw new Error(data.detail||'Request failed');show(data.message||'Password updated. You can now sign in.');setTimeout(()=>location.href='/',1200);}catch(err){show(err.message,true);}};</script></body></html>
