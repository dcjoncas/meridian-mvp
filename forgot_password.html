<!doctype html>
<html lang="en"><head><meta charset="utf-8" /><meta name="viewport" content="width=device-width, initial-scale=1" /><title>Meridian — Password Reset</title><link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin><link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600&family=Montserrat:wght@300;400;500;600;700&display=swap" rel="stylesheet"><style>:root{--bg:#07080b;--panel:#12131a;--rim:rgba(255,255,255,.08);--text:#eef1fb;--muted:#a6adc9;--gold:#e2c777;--danger:#ffb4b4}*{box-sizing:border-box}body{margin:0;min-height:100vh;display:grid;place-items:center;padding:24px;background:radial-gradient(circle at top left, rgba(226,199,119,.12), transparent 28%), radial-gradient(circle at bottom right, rgba(93,116,255,.08), transparent 25%), var(--bg);font-family:Montserrat,sans-serif;color:var(--text)}.card{width:min(520px,100%);background:linear-gradient(180deg, rgba(255,255,255,.04), rgba(255,255,255,.02));border:1px solid var(--rim);border-radius:22px;padding:28px;box-shadow:0 24px 70px rgba(0,0,0,.38)}.eyebrow{font-size:10px;letter-spacing:.32em;text-transform:uppercase;color:var(--gold)}h1{margin:8px 0 10px;font:600 42px/1.02 "Cormorant Garamond",serif;color:var(--gold)}p{margin:0 0 18px;color:var(--muted);line-height:1.7}label{display:block;font-size:11px;letter-spacing:.18em;text-transform:uppercase;color:var(--muted);margin-bottom:8px}input{width:100%;padding:14px 15px;border-radius:14px;border:1px solid var(--rim);background:rgba(255,255,255,.03);color:var(--text);font:inherit;outline:none}input:focus{border-color:rgba(226,199,119,.55);box-shadow:0 0 0 4px rgba(226,199,119,.08)}button,a.link{display:inline-flex;align-items:center;justify-content:center;padding:12px 15px;border-radius:12px;border:1px solid var(--rim);background:rgba(255,255,255,.03);color:var(--text);text-decoration:none;font-size:11px;font-weight:700;letter-spacing:.18em;text-transform:uppercase;cursor:pointer}button:hover,a.link:hover{border-color:rgba(226,199,119,.45);color:var(--gold)}.row{display:flex;gap:10px;flex-wrap:wrap;margin-top:18px}.notice{display:none;margin-top:14px;padding:12px 14px;border-radius:14px;border:1px solid var(--rim);background:rgba(255,255,255,.03)}.notice.show{display:block}.notice.error{border-color:rgba(255,180,180,.35);color:var(--danger);background:rgba(255,180,180,.08)}.preview{margin-top:12px;word-break:break-all;font-size:12px;color:var(--gold)}</style></head><body><div class="card"><div class="eyebrow">Meridian member access</div><h1>Password reset</h1><p>Enter your username or account email. If the account exists, a secure reset link will be issued. In environments without outbound email configured, the generated link is written to the server log.</p><label for="identifier">Username or email</label><input id="identifier" autocomplete="username email" /><div class="row"><button id="submitBtn">Send reset link</button><a class="link" href="/">Back to login</a></div><div class="notice" id="notice"></div><div class="preview" id="preview"></div></div><script>const $=id=>document.getElementById(id);function show(msg,err=false){const el=$('notice');el.textContent=msg;el.className='notice show'+(err?' error':'');} $('submitBtn').onclick=async()=>{try{const res=await fetch('/api/auth/forgot-password',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({identifier:$('identifier').value.trim()})});const data=await res.json();if(!res.ok) throw new Error(data.detail||'Request failed');show(data.message||'If the account exists, a reset link has been sent.');$('preview').textContent=data.preview_reset_url?`Preview reset link: ${data.preview_reset_url}`:'';}catch(err){show(err.message,true);}};</script></body></html>
