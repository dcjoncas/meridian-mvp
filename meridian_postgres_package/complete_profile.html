<!doctype html><html lang='en'><head><meta charset='utf-8' /><meta name='viewport' content='width=device-width,initial-scale=1' /><title>Meridian — Complete Profile</title><link rel='preconnect' href='https://fonts.googleapis.com'><link rel='preconnect' href='https://fonts.gstatic.com' crossorigin><link href='https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;600&family=Montserrat:wght@300;400;500;600;700&display=swap' rel='stylesheet'><style>*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}:root{--obsidian:#060608;--panel:#0E0E15;--surface:#13131E;--rim:rgba(255,255,255,.06);--gold:#C9A84C;--platinum:#A8AECC;--snow:#E9EAF4}body{font-family:'Montserrat',sans-serif;background:var(--obsidian);color:var(--snow)}.wrap{max-width:980px;margin:0 auto;padding:34px 28px}.title{font-family:'Cormorant Garamond',serif;font-size:36px;font-weight:300;margin-bottom:10px}.card{border:1px solid var(--rim);border-radius:10px;background:var(--panel);padding:22px}.grid{display:grid;grid-template-columns:1fr 1fr;gap:14px}.field{margin-bottom:14px}.field label{display:block;font-size:8px;letter-spacing:.22em;text-transform:uppercase;color:var(--platinum);opacity:.7;margin-bottom:6px}.field input,.field textarea{width:100%;padding:12px 14px;border-radius:8px;border:1px solid var(--rim);background:var(--surface);color:var(--snow);font-family:'Montserrat',sans-serif}.field textarea{min-height:100px}.btn{padding:12px 16px;border-radius:8px;border:1px solid rgba(201,168,76,.35);background:transparent;color:var(--gold);cursor:pointer;font-size:8px;font-weight:700;letter-spacing:.22em;text-transform:uppercase}.out{margin-top:16px;padding:14px;border:1px solid rgba(255,255,255,.08);border-radius:8px;background:rgba(255,255,255,.02);white-space:pre-wrap}@media(max-width:860px){.grid{grid-template-columns:1fr}}</style></head><body><div class='wrap'><div class='title'>Complete Your Meridian Profile</div><div style='color:rgba(168,174,204,.82);line-height:1.8;margin-bottom:16px'>Congratulations — you’ve been invited to join Meridian. Completing this form creates a vetted profile the community can use for relevant connections.</div><div class='card'><div class='grid'><div class='field'><label>Full Name</label><input id='displayName'></div><div class='field'><label>Email</label><input id='email' type='email'></div><div class='field'><label>Domains</label><input id='domains' placeholder='Comma separated'></div><div class='field'><label>Roles</label><input id='roles' placeholder='Comma separated'></div><div class='field'><label>Networks</label><input id='networks' placeholder='Comma separated'></div><div class='field'><label>Values</label><input id='values' placeholder='Comma separated'></div><div class='field'><label>Years Experience</label><input id='years' type='number' min='0'></div><div class='field'><label>Availability / Attributes</label><input id='availability' placeholder='e.g. near-term, board-ready'></div></div><div class='field'><label>Wins / Credentials</label><textarea id='assets' placeholder='Comma separated wins, credentials, outcomes'></textarea></div><button class='btn' id='submitProfile'>Submit For Vetting</button><div class='out' id='out' style='display:none'></div></div></div><script>const TOKEN="{{TOKEN}}";async function api(url, opts={}){const r=await fetch(url,{headers:{'Content-Type':'application/json'},...opts});const data=await r.json();if(!r.ok) throw new Error(data.detail||JSON.stringify(data));return data;}document.getElementById('submitProfile').addEventListener('click', async ()=>{const body={display_name: document.getElementById('displayName').value.trim(),email: document.getElementById('email').value.trim(),domains: document.getElementById('domains').value,roles: document.getElementById('roles').value,networks: document.getElementById('networks').value,values: document.getElementById('values').value,experience_years: document.getElementById('years').value,assets: document.getElementById('assets').value,attributes: {availability: document.getElementById('availability').value.trim()}};const out=document.getElementById('out');try{const res=await api(`/api/invitations/${TOKEN}/complete`,{method:'POST',body:JSON.stringify(body)});out.style.display='block';out.textContent=`Profile submitted.\nGMID: ${res.gmid}\nStatus: ${res.status}`;}catch(e){out.style.display='block';out.textContent=`Error: ${e.message}`;}});</script></body></html>
